<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Final Practical</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
</head>
<body>
    <div class="modal fade" id="calendarModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="modalLabel"></h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body d-flex justify-content-center align-items-center">
                <div class="d-flex justify-content-center align-items-center">
                    <div class="input-group mb-3 p-2">
                        <span class="input-group-text" id="basic-addon1">In</span>
                        <input type="date" class="form-control form-control-sm bg-dark text-white" aria-describedby="basic-addon1">
                    </div>
                    <div class="input-group mb-3 p-2">
                        <span class="input-group-text" id="basic-addon2">Out</span>
                        <input type="date" class="form-control form-control-sm bg-dark text-white" aria-describedby="basic-addon2">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Save and Continue Browsing</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Proceed to Checkout?</button>
            </div>
            </div>
        </div>
    </div>
    
    <div class="offcanvas offcanvas-end bg-dark text-white" tabindex="-1" id="checkoutOffcanvas" aria-labelledby="offcanvasRightLabel" data-bs-backdrop="static">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="offcanvasRightLabel">Checkout</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <div class="checkoutForm">

            </div>
        </div>
    </div>

<div class="container-fluid d-flex h-100 p-0 bg-dark text-white">
    <div id="sidebar" class="d-flex flex-column p-3">
        <div id="sidebarTitle" class="d-flex justify-content-between align-items-center">
            <h1>Hotels Sinnoh</h1>
        </div>
        <div id="icons" class="d-flex justify-content-around align-items-center mb-2">
            <i class="bi bi-cart3 fs-2" data-bs-toggle="offcanvas" data-bs-target="#checkoutOffcanvas" aria-controls="checkoutOffcanvas"></i>
            <i class="bi bi-filter fs-2"></i>
        </div>
        <div id="sidebarCards" class="d-flex flex-column overflow-y-auto pe-2"></div>
    </div>
    <div class="container-fluid h-100 p-0" id="map-container">
        <div id="map"></div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="scripts/project.js"></script>
</body>
</html>
